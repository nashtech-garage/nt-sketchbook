<div class="nt-page">
    <style>
        .category-section {
            margin-bottom: 40px;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(
                auto-fill,
                minmax(120px, 1fr)
            );
            gap: 15px;
        }
        .icon-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-card:hover {
            background: #f9f9f9;
            border-color: #aaa;
        }
        .icon-card span {
            display: block;
            font-size: 12px;
            margin-top: 8px;
            color: #666;
        }
    </style>
    <input
        type="text"
        id="search"
        placeholder="Search icons..."
        class="nt-input nt-input-default nt-mb-3"
    />
    <div id="gallery"></div>
    <script src="./script.js"></script>
</div>
