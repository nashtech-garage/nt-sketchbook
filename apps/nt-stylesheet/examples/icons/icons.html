<div class="nt-page">
    <style>
        .category-section {
            margin-bottom: 40px;
        }
        .icon-grid {
            grid-template-columns: repeat(
                auto-fill,
                minmax(120px, 1fr)
            );
            gap: 5px;
            display: inline-flex;
            flex-wrap: wrap;
        }
        .icon-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            aspect-ratio: 1 / 1;
            width: 56px;
            height: 56px;
        }
        .icon-card:hover {
            background: #f9f9f9;
            border-color: #aaa;
        }
        .icon-card span {
            display: block;
            font-size: 12px;
            margin-top: 8px;
            color: #666;
        }
    </style>
    <input
        type="text"
        id="search"
        placeholder="Search icons..."
        class="nt-input nt-input-default nt-mb-3"
    />
    <div id="gallery"></div>
    <script src="./script.js"></script>
</div>
