<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Select Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__DOCS_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="../docs/components.html?component=select"
                    >Open in docs</a
                >
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h1 class="nt-title nt-page-header-title nt-mb-4">
                        Select
                    </h1>
                </div>

                <div class="nt-page-body">
                    <!-- Variant default -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            Variant default
                        </h2>
                        <select
                            class="nt-select nt-select-default nt-select-medium"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- Variant danger -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            Variant Danger
                        </h2>
                        <select
                            class="nt-select nt-select-danger nt-select-medium"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- Variant success -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            Variant success
                        </h2>
                        <select
                            class="nt-select nt-select-success nt-select-medium"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- Variant warning -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            Variant warning
                        </h2>
                        <select
                            class="nt-select nt-select-warning nt-select-medium"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- Variant bare -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            Variant bare
                        </h2>
                        <select
                            class="nt-select nt-select-bare nt-select-medium"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- With icon (pseudo) -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            With icon
                        </h2>
                        <div class="nt-select-wrapper">
                            <i
                                class="nti nti-a-arrow-up nt-select-icon nti-2x"
                            ></i>
                            <select
                                class="nt-select nt-select-default nt-select-medium"
                            >
                                <option value="" disabled selected>
                                    Select an option
                                </option>
                                <option>Option 1</option>
                                <option>Option 2</option>
                                <option>Option 3</option>
                            </select>
                        </div>
                    </div>

                    <!-- Size small -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title nt-mb-2">
                            Size small
                        </h2>
                        <select
                            class="nt-select nt-select-default nt-select-small"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- Size large -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title">Size large</h2>
                        <select
                            class="nt-select nt-select-default nt-select-large"
                        >
                            <option value="" disabled selected>
                                Select an option
                            </option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>

                    <!-- Disabled -->
                    <div
                        class="nt-page-section nt-flex nt-flex-col nt-gap-3 nt-mb-4"
                    >
                        <h2 class="nt-section-title">Disabled</h2>
                        <select
                            class="nt-select nt-select-default nt-select-medium"
                            disabled
                        >
                            <option>Select an option</option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__DOCS_ASSET:examples/direct.js__"></script>
    </body>
</html>
