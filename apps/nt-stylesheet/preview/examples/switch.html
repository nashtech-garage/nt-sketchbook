<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Switch Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link rel="stylesheet" href="__PREVIEW_ASSET:examples/direct.css__" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=switch">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-body">
                    <div class="nt-mb-4">
                        <h2 class="nt-mb-4">Default</h2>
                        <label class="nt-switch">
                            <input type="checkbox" class="nt-switch-input" />
                            <span class="nt-switch-slider"></span>
                        </label>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="nt-mb-4">Danger</h2>
                        <label class="nt-switch nt-switch-danger">
                            <input type="checkbox" class="nt-switch-input" />
                            <span class="nt-switch-slider"></span>
                        </label>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="nt-mb-4">Warning</h2>
                        <label class="nt-switch nt-switch-warning">
                            <input type="checkbox" class="nt-switch-input" />
                            <span class="nt-switch-slider"></span>
                        </label>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="nt-mb-4">Disabled</h2>
                        <label class="nt-switch nt-switch-warning">
                            <input
                                type="checkbox"
                                disabled
                                checked
                                class="nt-switch-input"
                            />
                            <span class="nt-switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__PREVIEW_ASSET:examples/direct.js__"></script>
    </body>
</html>
