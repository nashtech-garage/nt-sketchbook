<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Inputs Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="../css/nt.css" />
        <link rel="stylesheet" href="../themes/nt-theme-light.css" />
        <link rel="stylesheet" href="../brands/nashtech.css" />
        <link rel="stylesheet" href="../css/nt-icons.css" />
        <link rel="stylesheet" href="../assets/examples/direct.css" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=inputs">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h2 class="nt-title nt-mb-4">Basic Inputs</h2>
                </div>
                <div class="nt-page-body">
                    <input
                        type="text"
                        placeholder="Input default"
                        class="nt-input nt-input-default nt-mb-3"
                    />
                    <input
                        type="text"
                        placeholder="Input disabled"
                        class="nt-input nt-input-danger nt-mb-3"
                        disabled
                    />
                    <input
                        type="text"
                        placeholder="Input success"
                        class="nt-input nt-input-success nt-mb-3"
                    />
                    <input
                        type="text"
                        placeholder="Input danger"
                        class="nt-input nt-input-danger nt-mb-3"
                    />
                    <input
                        type="text"
                        placeholder="Input warning"
                        class="nt-input nt-input-warning nt-mb-3"
                    />
                    <h2 class="nt-title nt-my-4">Inputs with icon</h2>
                    <div
                        class="nt-input-container nt-input-container-success nt-mb-3"
                    >
                        <input
                            type="text"
                            placeholder="input success with icon"
                            class="nt-input nt-input-success"
                        />
                    </div>
                    <div
                        class="nt-input-container nt-input-container-danger nt-mb-3"
                    >
                        <input
                            type="text"
                            placeholder="input danger with icon"
                            class="nt-input nt-input-danger"
                        />
                    </div>
                    <div
                        class="nt-input-container nt-input-container-warning nt-mb-3"
                    >
                        <input
                            type="text"
                            placeholder="input warning with icon"
                            class="nt-input nt-input-warning"
                        />
                    </div>
                    <div class="nt-input-container nt-mb-3">
                        <input
                            type="text"
                            placeholder="input icon custom"
                            class="nt-input nt-input-success"
                        />
                        <span class="nt-input-icon">🚀</span>
                    </div>
                    <div class="nt-input-container nt-mb-3">
                        <span class="nt-input-icon">🚀</span>
                        <input
                            type="text"
                            placeholder="input icon custom"
                            class="nt-input nt-input-success nt-input-icon-left"
                        />
                    </div>
                    <div
                        class="nt-input-container nt-input-container-warning nt-mb-3"
                    >
                        <span class="nt-input-icon">🚀</span>
                        <input
                            type="text"
                            placeholder="input warning with 2 icons"
                            class="nt-input nt-input-warning"
                        />
                    </div>
                    <div class="nt-input-container nt-mb-3">
                        <span class="nt-input-icon">🚀</span>
                        <input
                            type="text"
                            placeholder="input custom with 2 icons"
                            class="nt-input nt-input-warning"
                        />
                        <span class="nt-input-icon">🚀</span>
                    </div>
                </div>
            </div>
        </main>
        <script src="../scripts/nt.js"></script>
        <script src="../assets/examples/direct.js"></script>
    </body>
</html>
