<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Input Group Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link rel="stylesheet" href="__PREVIEW_ASSET:examples/direct.css__" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=input-group">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h2 class="nt-title nt-mb-4">Inputs Group</h2>
                </div>
                <div class="nt-page-body">
                    <div class="nt-input-group nt-input-static nt-mb-4">
                        <label class="nt-input-label" for="fruit">Fruit</label>
                        <input
                            id="fruit"
                            class="nt-input nt-input-default"
                            type="text"
                            placeholder="Apple"
                        />
                        <span class="nt-input-highlight">
                            input fruit and press enter
                        </span>
                    </div>
            
                    <div class="nt-input-group nt-input-float">
                        <label class="nt-input-label" for="email">Email</label>
                        <input
                            id="email"
                            class="nt-input nt-input-danger"
                            type="email"
                            placeholder="apple@example.com"
                        />
                        <span class="nt-input-error">
                            input email and press enter
                        </span>
                    </div>
            
                    <div class="nt-input-group nt-input-static nt-mb-4">
                        <label class="nt-input-label" for="Weapons">
                            Weapons
                        </label>
                        <div
                            class="nt-input-container nt-input-container-success"
                        >
                            <input
                                id="Weapons"
                                class="nt-input nt-input-success"
                                type="text"
                                placeholder="Apple"
                            />
                        </div>
                        <span class="nt-input-highlight"> Success </span>
                    </div>
            
                    <div class="nt-input-group nt-input-float">
                        <label class="nt-input-label" for="email">Email</label>
                        <div class="nt-input-container nt-input-container-danger">
                            <input
                                id="email"
                                class="nt-input nt-input-danger"
                                type="email"
                                placeholder="apple@example.com"
                            />
                        </div>
                        <span class="nt-input-error">
                            input email and press enter
                        </span>
                    </div>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__PREVIEW_ASSET:examples/direct.js__"></script>
    </body>
</html>
