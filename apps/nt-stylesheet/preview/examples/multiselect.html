<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Multiselect Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__DOCS_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="../docs/components.html?component=multiselect"
                    >Open in docs</a
                >
            </nav>
            <div class="nt-page">
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Default"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Variant danger"
                    data-variant="danger"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Variant success"
                    data-variant="success"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Variant warning"
                    data-variant="warning"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__DOCS_ASSET:examples/direct.js__"></script>
    </body>
</html>
