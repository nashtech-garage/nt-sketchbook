<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Multiselect Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="../css/nt.css" />
        <link rel="stylesheet" href="../themes/nt-theme-light.css" />
        <link rel="stylesheet" href="../brands/nashtech.css" />
        <link rel="stylesheet" href="../css/nt-icons.css" />
        <link rel="stylesheet" href="../assets/examples/direct.css" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=multiselect">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <select data-nt-multi-select multiple data-placeholder="Default">
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Variant danger"
                    data-variant="danger"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Variant success"
                    data-variant="success"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
                <select
                    data-nt-multi-select
                    multiple
                    data-placeholder="Variant warning"
                    data-variant="warning"
                >
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
            </div>
        </main>
        <script src="../scripts/nt.js"></script>
        <script src="../assets/examples/direct.js"></script>
    </body>
</html>
