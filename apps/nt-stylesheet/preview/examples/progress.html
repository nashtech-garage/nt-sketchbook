<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Progress Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link rel="stylesheet" href="__PREVIEW_ASSET:examples/direct.css__" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=progress">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-body">
                    <div class="nt-d-flex nt-flex-col nt-gap-2">
                        <h1 class="">Variants</h1>
                        <div class="nt-progress nt-progress-success">
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div class="nt-progress nt-progress-warning">
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div class="nt-progress nt-progress-danger">
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div class="nt-progress nt-progress-info">
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div class="nt-progress">
                            <div
                                class="nt-progress-bar"
                                style="width: 100%"
                            ></div>
                            <span
                                class="nt-progress-label nt-progress-label-outside"
                                >100%
                            </span>
                        </div>
                    </div>
                    <div class="nt-d-flex nt-flex-col nt-gap-2">
                        <h1 class="">Size</h1>
                        <div class="nt-progress nt-progress-success">
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div
                            class="nt-progress nt-progress-warning nt-progress-md"
                        >
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div
                            class="nt-progress nt-progress-danger nt-progress-lg"
                        >
                            <div class="nt-progress-bar" style="width: 70%"></div>
                            <span class="nt-progress-label">70%</span>
                        </div>
                        <div class="nt-progress nt-progress-xl">
                            <div
                                class="nt-progress-bar"
                                style="width: 100%"
                            ></div>
                            <span
                                class="nt-progress-label nt-progress-label-outside"
                                >100%
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__PREVIEW_ASSET:examples/direct.js__"></script>
    </body>
</html>
