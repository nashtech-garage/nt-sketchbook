<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Breadcrumb Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="../css/nt.css" />
        <link rel="stylesheet" href="../themes/nt-theme-light.css" />
        <link rel="stylesheet" href="../brands/nashtech.css" />
        <link rel="stylesheet" href="../css/nt-icons.css" />
        <link rel="stylesheet" href="../assets/examples/direct.css" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=breadcrumb">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h1 class="nt-title nt-page-header-title">Breadcrumb</h1>
                </div>
                <div class="nt-page-body">
                    <nav class="nt-breadcrumb">
                        <ol class="nt-breadcrumb-list">
                            <li class="nt-breadcrumb-list-item">
                                <a
                                    class="nt-breadcrumb-list-item-link"
                                    href="/dashboard"
                                    >Dashboard</a
                                >
                            </li>
                            <li class="nt-breadcrumb-list-item">
                                <a
                                    class="nt-breadcrumb-list-item-link"
                                    href="/electronics"
                                    >Products</a
                                >
                            </li>
                            <li class="nt-breadcrumb-list-item">
                                <span class="nt-breadcrumb-list-item-current"
                                    >Electronics</span
                                >
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
        </main>
        <script src="../scripts/nt.js"></script>
        <script src="../assets/examples/direct.js"></script>
    </body>
</html>
