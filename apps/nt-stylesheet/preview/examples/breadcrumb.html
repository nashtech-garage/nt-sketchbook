<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Breadcrumb Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__DOCS_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="../docs/components.html?component=breadcrumb"
                    >Open in docs</a
                >
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h1 class="nt-title nt-page-header-title">
                        Breadcrumb
                    </h1>
                </div>
                <div class="nt-page-body">
                    <nav class="nt-breadcrumb">
                        <ol class="nt-breadcrumb-list">
                            <li class="nt-breadcrumb-list-item">
                                <a
                                    class="nt-breadcrumb-list-item-link"
                                    href="/dashboard"
                                    >Dashboard</a
                                >
                            </li>
                            <li class="nt-breadcrumb-list-item">
                                <a
                                    class="nt-breadcrumb-list-item-link"
                                    href="/electronics"
                                    >Products</a
                                >
                            </li>
                            <li class="nt-breadcrumb-list-item">
                                <span
                                    class="nt-breadcrumb-list-item-current"
                                    >Electronics</span
                                >
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__DOCS_ASSET:examples/direct.js__"></script>
    </body>
</html>
