<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Radio Group Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__PREVIEW_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=radio-group"
                    >Open in viewer</a
                >
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h2 class="nt-title nt-mb-4">Radio grid</h2>
                </div>
                <div class="nt-page-body">
                    <div class="nt-radio-column nt-mb-10">
                        <label class="nt-radio">
                            <input
                                type="radio"
                                name="choice"
                                value="1"
                            />
                            Option A
                        </label>
                        <label class="nt-radio">
                            <input
                                type="radio"
                                name="choice"
                                value="2"
                            />
                            Option B
                        </label>
                        <label class="nt-radio">
                            <input
                                type="radio"
                                name="choice"
                                value="3"
                            />
                            Option C
                        </label>
                    </div>

                    <h2 class="nt-my-4">Radio row</h2>
                    <div class="nt-radio-row">
                        <label class="nt-radio">
                            <input
                                type="radio"
                                name="layout"
                                value="row1"
                            />
                            Row 1
                        </label>
                        <label class="nt-radio">
                            <input
                                type="radio"
                                name="layout"
                                value="row2"
                            />
                            Row 2
                        </label>
                    </div>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__PREVIEW_ASSET:examples/direct.js__"></script>
    </body>
</html>
