<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Button Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__DOCS_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="../docs/components.html?component=button"
                    >Open in docs</a
                >
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h1 class="nt-title nt-page-header-title">
                        Button
                    </h1>
                </div>
                <div class="nt-page-body">
                    <div class="nt-mb-4">
                        <h2 class="nt-title">Variant</h2>
                        <div>
                            <button
                                class="nt-button nt-button-gradient"
                            >
                                Gradient
                            </button>
                            <button
                                class="nt-button nt-button-primary"
                            >
                                Primary
                            </button>
                            <button
                                class="nt-button nt-button-secondary"
                            >
                                Secondary
                            </button>
                            <button
                                class="nt-button nt-button-neutral"
                            >
                                Neutral
                            </button>
                            <button
                                class="nt-button nt-button-success"
                            >
                                Success
                            </button>
                            <button
                                class="nt-button-outline nt-button-primary"
                            >
                                Outline Primary
                            </button>
                            <button
                                class="nt-button-outline nt-button-secondary"
                            >
                                Outline Secondary
                            </button>
                            <button
                                class="nt-button-outline nt-button-neutral"
                            >
                                Outline Neutral
                            </button>
                            <button
                                class="nt-button-outline nt-button-success"
                            >
                                Outline Success
                            </button>
                        </div>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="font-semibold nt-mb-4">Size</h2>
                        <div>
                            <button
                                class="nt-button nt-button-primary nt-button-sm"
                            >
                                sm
                            </button>
                            <button
                                class="nt-button nt-button-primary"
                            >
                                md
                            </button>
                            <button
                                class="nt-button nt-button-primary nt-button-lg"
                            >
                                lg
                            </button>
                        </div>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="font-semibold nt-mb-4">
                            Disabled
                        </h2>
                        <div>
                            <button
                                class="nt-button nt-button-gradient"
                                disabled
                            >
                                Disabled
                            </button>
                            <button
                                class="nt-button nt-button-secondary"
                                disabled
                            >
                                Disabled
                            </button>
                            <button
                                class="nt-button nt-button-success"
                                disabled
                            >
                                Disabled
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__DOCS_ASSET:examples/direct.js__"></script>
    </body>
</html>
