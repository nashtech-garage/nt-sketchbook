<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Button Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="../css/nt.css" />
        <link rel="stylesheet" href="../themes/nt-theme-light.css" />
        <link rel="stylesheet" href="../brands/nashtech.css" />
        <link rel="stylesheet" href="../css/nt-icons.css" />
        <link rel="stylesheet" href="../assets/examples/direct.css" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=button">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h1 class="nt-title nt-page-header-title">Button</h1>
                </div>
                <div class="nt-page-body">
                    <div class="nt-mb-4">
                        <h2 class="nt-title">Variant</h2>
                        <div>
                            <button class="nt-button nt-button-gradient">
                                Gradient
                            </button>
                            <button class="nt-button nt-button-primary">
                                Primary
                            </button>
                            <button class="nt-button nt-button-secondary">
                                Secondary
                            </button>
                            <button class="nt-button nt-button-neutral">
                                Neutral
                            </button>
                            <button class="nt-button nt-button-success">
                                Success
                            </button>
                            <button class="nt-button-outline nt-button-primary">
                                Outline Primary
                            </button>
                            <button class="nt-button-outline nt-button-secondary">
                                Outline Secondary
                            </button>
                            <button class="nt-button-outline nt-button-neutral">
                                Outline Neutral
                            </button>
                            <button class="nt-button-outline nt-button-success">
                                Outline Success
                            </button>
                        </div>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="font-semibold nt-mb-4">Size</h2>
                        <div>
                            <button
                                class="nt-button nt-button-primary nt-button-sm"
                            >
                                sm
                            </button>
                            <button class="nt-button nt-button-primary">
                                md
                            </button>
                            <button
                                class="nt-button nt-button-primary nt-button-lg"
                            >
                                lg
                            </button>
                        </div>
                    </div>
                    <div class="nt-mb-4">
                        <h2 class="font-semibold nt-mb-4">Disabled</h2>
                        <div>
                            <button class="nt-button nt-button-gradient" disabled>
                                Disabled
                            </button>
                            <button
                                class="nt-button nt-button-secondary"
                                disabled
                            >
                                Disabled
                            </button>
                            <button class="nt-button nt-button-success" disabled>
                                Disabled
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <script src="../scripts/nt.js"></script>
        <script src="../assets/examples/direct.js"></script>
    </body>
</html>
