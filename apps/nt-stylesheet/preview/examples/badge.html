<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Badge Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__DOCS_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="../docs/components.html?component=badge">Open in docs</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h2 class="nt-title">Badge Variants</h2>
                </div>
                <div class="nt-page-body">
                    <span class="nt-badge">Default</span>
                    <span class="nt-badge nt-badge-info">Info</span>
                    <span class="nt-badge nt-badge-success"
                        >Success</span
                    >
                    <span class="nt-badge nt-badge-warning"
                        >Warning</span
                    >
                    <span class="nt-badge nt-badge-danger"
                        >Danger</span
                    >

                    <h2 class="nt-my-4">Badge Sizes</h2>
                    <span class="nt-badge nt-badge-small">Small</span>
                    <span class="nt-badge">Default</span>
                    <span class="nt-badge nt-badge-large">Large</span>

                    <h2 class="nt-my-4">Rounded Badges</h2>
                    <span class="nt-badge nt-badge-rounded">R</span>
                    <span
                        class="nt-badge nt-badge-info nt-badge-rounded"
                        >i</span
                    >
                    <span
                        class="nt-badge nt-badge-success nt-badge-rounded"
                        >S</span
                    >
                    <span
                        class="nt-badge nt-badge-warning nt-badge-rounded"
                        >W</span
                    >
                    <span
                        class="nt-badge nt-badge-danger nt-badge-rounded"
                        >D</span
                    >
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__DOCS_ASSET:examples/direct.js__"></script>
    </body>
</html>
