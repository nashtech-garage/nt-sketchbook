<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Component Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="../css/nt.css" />
        <link
            id="nt-theme-style"
            rel="stylesheet"
            href="../themes/nt-theme-light.css"
        />
        <link rel="stylesheet" href="../brands/nashtech.css" />
        <link rel="stylesheet" href="../css/nt-icons.css" />
        <link rel="stylesheet" href="../assets/examples/view.css" />
    </head>
    <body data-theme="nt-theme-light">
        <header class="example-header">
            <div class="example-header-inner">
                <a class="example-brand" href="../index.html">
                    <img alt="NashTech" src="../assets/name.png" />
                    <span>Example</span>
                </a>
                <nav class="example-nav" aria-label="Example navigation">
                    <a href="../index.html">Home</a>
                    <a href="../docs/styles.html">Styles docs</a>
                    <a href="../docs/README.md">Docs</a>
                </nav>
                <div class="example-header-actions">
                    <button
                        class="example-icon-button"
                        id="theme-toggle"
                        type="button"
                        aria-label="Toggle dark theme"
                        title="Toggle theme"
                    >
                        <i class="nti nti-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="example-main">
            <div class="example-toolbar">
                <div>
                    <span class="nt-badge nt-badge-info">Live component</span>
                    <h1 class="example-title" id="example-title">
                        Component example
                    </h1>
                </div>
                <select
                    class="nt-select example-select"
                    id="component-select"
                    aria-label="Choose component example"
                ></select>
            </div>

            <div class="example-docs-grid">
                <section aria-labelledby="preview-title">
                    <div class="example-panel-header">
                        <h2 class="example-panel-title" id="preview-title">
                            Preview
                        </h2>
                    </div>
                    <div
                        class="example-frame"
                        id="example-frame"
                        aria-live="polite"
                    >
                        <p class="example-empty">Loading example...</p>
                    </div>
                </section>

                <section aria-labelledby="code-title">
                    <div class="example-panel-header">
                        <h2 class="example-panel-title" id="code-title">
                            HTML
                        </h2>
                        <button
                            class="nt-button-outline nt-button-primary"
                            id="copy-code"
                            type="button"
                        >
                            Copy
                        </button>
                    </div>
                    <pre class="example-code"><code id="example-code">Loading code...</code></pre>
                </section>
            </div>
        </main>

        <script src="../scripts/nt.js"></script>
        <script src="../assets/examples/view.js"></script>
    </body>
</html>
