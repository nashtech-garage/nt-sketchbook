<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Redirecting - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <meta http-equiv="refresh" content="0; url=../docs/components.html" />
    </head>
    <body>
        <script>
            const params = new URLSearchParams(window.location.search)
            const target = new URL(
                '../docs/components.html',
                window.location.href
            )

            if (params.has('component')) {
                target.searchParams.set(
                    'component',
                    params.get('component')
                )
            }

            window.location.replace(target)
        </script>
        <p>
            Redirecting to
            <a href="../docs/components.html">component examples</a>.
        </p>
    </body>
</html>
