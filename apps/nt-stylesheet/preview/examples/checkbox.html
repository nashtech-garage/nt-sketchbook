<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Checkbox Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="__NT_CSS__" />
        <link rel="stylesheet" href="__NT_THEME_LIGHT_CSS__" />
        <link rel="stylesheet" href="__NT_BRAND_CSS__" />
        <link rel="stylesheet" href="__NT_ICONS_CSS__" />
        <link
            rel="stylesheet"
            href="__PREVIEW_ASSET:examples/direct.css__"
        />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav
                class="example-direct-nav"
                aria-label="Example navigation"
            >
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=checkbox"
                    >Open in viewer</a
                >
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h2 class="nt-title">Basic Checkbox</h2>
                </div>
                <div class="nt-page-body">
                    <!-- Default Checkbox -->
                    <label class="nt-checkbox">
                        <input type="checkbox" />
                        Default
                    </label>

                    <label class="nt-checkbox">
                        <input type="checkbox" disabled />
                        Default disabled
                    </label>

                    <label class="nt-checkbox">
                        <input type="checkbox" checked />
                        Checked
                    </label>

                    <label class="nt-checkbox">
                        <input type="checkbox" checked disabled />
                        Checked disabled
                    </label>

                    <label class="nt-checkbox">
                        <input
                            type="checkbox"
                            class="indeterminate"
                        />
                        Indeterminate
                    </label>

                    <label class="nt-checkbox">
                        <input
                            type="checkbox"
                            class="indeterminate"
                            disabled
                        />
                        Indeterminate disabled
                    </label>
                </div>
            </div>
        </main>
        <script src="__NT_SCRIPT__"></script>
        <script src="__PREVIEW_ASSET:examples/direct.js__"></script>
    </body>
</html>
