<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Checkbox Example - NT Stylesheet</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link rel="stylesheet" href="../css/nt.css" />
        <link rel="stylesheet" href="../themes/nt-theme-light.css" />
        <link rel="stylesheet" href="../brands/nashtech.css" />
        <link rel="stylesheet" href="../css/nt-icons.css" />
        <link rel="stylesheet" href="../assets/examples/direct.css" />
    </head>
    <body data-theme="nt-theme-light">
        <main class="example-direct-shell">
            <nav class="example-direct-nav" aria-label="Example navigation">
                <a href="../index.html">NT Stylesheet</a>
                <a href="view.html?component=checkbox">Open in viewer</a>
            </nav>
            <div class="nt-page">
                <div class="nt-page-header">
                    <h2 class="nt-title">Basic Checkbox</h2>
                </div>
                <div class="nt-page-body">
                <!-- Default Checkbox -->
                <label class="nt-checkbox">
                    <input type="checkbox" />
                    Default
                </label>
            
                <label class="nt-checkbox">
                    <input type="checkbox" disabled />
                    Default disabled
                </label>
            
                <label class="nt-checkbox">
                    <input type="checkbox" checked />
                    Checked
                </label>
            
                <label class="nt-checkbox">
                    <input type="checkbox" checked disabled />
                    Checked disabled
                </label>
            
                <label class="nt-checkbox">
                    <input type="checkbox" class="indeterminate" />
                    Indeterminate
                </label>
            
                <label class="nt-checkbox">
                    <input type="checkbox" class="indeterminate" disabled />
                    Indeterminate disabled
                </label>
                </div>
            </div>
        </main>
        <script src="../scripts/nt.js"></script>
        <script src="../assets/examples/direct.js"></script>
    </body>
</html>
